<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">

    <!-- Tab 导航条 -->
    <div class="tab-nav">
      <span class="tab-nav-title" id="tabNavTitle">翻译</span>
      <button class="tab-nav-btn" id="tabNavBtn" title="设置">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
    </div>

    <!-- ====== 翻译 Tab ====== -->
    <div class="tab-panel active" id="translatePanel">
      <div class="config-indicator" id="configIndicator">未配置模型</div>

      <textarea id="manualInput" placeholder="输入要翻译的文本，Ctrl+Enter 快捷翻译…" rows="4"></textarea>
      <button id="manualTranslateBtn" class="btn-translate">翻译</button>
      <div class="manual-result" id="manualResult"></div>
    </div>

    <!-- ====== 设置 Tab ====== -->
    <div class="tab-panel" id="settingsPanel">
      <div class="form-group">
        <label for="provider">LLM 提供商</label>
        <select id="provider">
          <option value="deepseek">DeepSeek</option>
          <option value="bailian">阿里云百炼</option>
          <option value="openai">OpenAI 兼容</option>
        </select>
      </div>

      <div class="form-group">
        <label for="apiKey">API Key</label>
        <div class="input-with-btn">
          <input type="password" id="apiKey" placeholder="sk-..." spellcheck="false" />
          <button class="input-toggle-btn" id="toggleApiKey" title="显示/隐藏" tabindex="-1">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="baseUrl">API 地址</label>
        <input type="text" id="baseUrl" placeholder="选择提供商后自动填充" spellcheck="false" />
      </div>

      <div class="form-group">
        <label for="model">模型</label>
        <input type="text" id="model" placeholder="选择提供商后自动填充" spellcheck="false" />
      </div>

      <div class="form-group">
        <label for="targetLang">目标语言</label>
        <input type="text" id="targetLang" value="中文" />
      </div>

      <div class="form-group">
        <label for="triggerMode">翻译触发时机</label>
        <select id="triggerMode">
          <option value="click">点击图标时翻译</option>
          <option value="immediate">选中后立刻翻译</option>
        </select>
      </div>

      <div class="form-group">
        <label for="theme">主题</label>
        <select id="theme">
          <option value="system">跟随系统</option>
          <option value="light">浅色</option>
          <option value="dark">深色</option>
        </select>
      </div>

      <div class="form-group checkbox-group">
        <label class="checkbox-label">
          <input type="checkbox" id="disableThinking" checked />
          <span>禁用深度思考模式</span>
        </label>
      </div>

      <div class="form-divider"></div>

      <div class="form-group">
        <label>配置预设</label>
        <div class="preset-row">
          <input type="text" id="presetName" placeholder="输入新预设名称…" spellcheck="false" />
          <button class="preset-btn preset-btn-save" id="savePresetBtn" title="保存为预设">保存</button>
        </div>
        <div class="preset-row preset-row-select">
          <select id="presetSelect">
            <option value="">— 载入已存预设 —</option>
          </select>
          <button class="preset-btn preset-btn-del" id="deletePresetBtn" title="删除选中预设" disabled>✕</button>
        </div>
      </div>

      <div class="form-divider"></div>

      <div class="status" id="status"></div>
    </div>

  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
